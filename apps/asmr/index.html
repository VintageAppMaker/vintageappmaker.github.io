<body class="botanical-bg min-h-screen relative flex flex-col font-body selection:bg-primary-container selection:text-on-primary-container">

<!-- Floating Search Action Button -->

</button>
</div>
<!-- Search Bottom Sheet Backdrop -->
<div class="fixed inset-0 bg-on-background/20 backdrop-blur-sm z-[60] transition-opacity duration-300 pointer-events-none opacity-0" id="search-sheet-overlay" onclick="document.getElementById('search-sheet').classList.add('translate-y-full')"></div>
<!-- Search Bottom Sheet -->
<div class="fixed bottom-0 left-0 right-0 z-[70] translate-y-full bottom-sheet-transition" id="search-sheet">
<div class="bg-surface-container-lowest rounded-t-xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] px-6 pt-3 pb-12 max-w-xl mx-auto">
<div class="flex justify-center mb-6">

</div>

<p class="text-on-surface-variant text-sm">Explore the digital conservatory</p>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">search</span>
<input class="w-full pl-12 pr-6 py-4 bg-surface-container rounded-full border-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline-variant font-medium" id="search-input" placeholder="Search by YouTube title..." type="text"/>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-primary-container text-on-primary-container rounded-full text-xs font-bold tracking-widest uppercase active:scale-95 transition-transform" data-category="Rain" type="button">Rain</button>
<button class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-full text-xs font-bold tracking-widest uppercase active:scale-95 transition-transform" data-category="island" type="button">Island</button>
<button class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-full text-xs font-bold tracking-widest uppercase active:scale-95 transition-transform" data-category="street" type="button">Street</button>
</div>
</div>
<button class="mt-8 w-full py-4 bg-primary text-on-primary rounded-full font-bold tracking-wider uppercase text-xs active:scale-[0.98] transition-transform" id="search-button">
                Apply Search
            </button>
</div>
</div>
<!-- Script for interaction simulation (Backdrop toggle) -->
<script>
        const list = [
            {
                category: 'Rain',
                url: 'https://www.youtube.com/watch?v=gZqkSSqBa-8',
                title: '아무도 없는 새벽 차분하고 잔잔한 빗소리 ASMR',
                meta: '피스풀모닝 Peaceful Morning • Rain',
                duration: '8:00:00',
                thumbnail: 'https://i.ytimg.com/vi/gZqkSSqBa-8/hqdefault.jpg',
                thumbnailAlt: '아무도 없는 새벽 차분하고 잔잔한 빗소리 ASMR'
            },
            {
                category: 'Rain',
                url: 'https://www.youtube.com/watch?v=lQ0fS2meTYQ',
                title: '불면증에 좋은 최고의 빗소리 10분이내 수면 백색소음 자장가 ASMR | Rain Sounds For Sleeping, White Noise',
                meta: 'Relax Sleep ASMR • Rain',
                duration: '10:00:36',
                thumbnail: 'https://i.ytimg.com/vi/lQ0fS2meTYQ/hqdefault.jpg',
                thumbnailAlt: '불면증에 좋은 최고의 빗소리 10분이내 수면 백색소음 자장가 ASMR'
            },
            {
                category: 'Rain',
                url: 'https://www.youtube.com/watch?v=RlHRwuVVJqc',
                title: 'Heavy Rain Walk in Tokyo’s Record-Breaking Storm: 4K/HDR Video | Relaxing Natural City Ambience',
                meta: 'Tokyo Ninja Walk • Rain',
                duration: '1:04:35',
                thumbnail: 'https://i.ytimg.com/vi/RlHRwuVVJqc/hqdefault.jpg',
                thumbnailAlt: 'Heavy Rain Walk in Tokyo’s Record-Breaking Storm'
            },
            {
                category: 'Rain',
                url: 'https://www.youtube.com/watch?v=lP4wSXSH9nM',
                title: 'Best Rain in the Forest at Night 🌲 | Sleep Deeply with Rain Sounds',
                meta: 'The Raining Room • Rain',
                duration: '3:02:08',
                thumbnail: 'https://i.ytimg.com/vi/lP4wSXSH9nM/hqdefault.jpg',
                thumbnailAlt: 'Best Rain in the Forest at Night'
            },
            {
                category: 'Rain',
                url: 'https://www.youtube.com/watch?v=J4d-a7dVtiQ',
                title: '【10M】 Soothing Rain Sounds🌧️ | Close Your Eyes and Feel the Rain',
                meta: 'Rainy Bedroom • Rain',
                duration: '8:00:00',
                thumbnail: 'https://i.ytimg.com/vi/J4d-a7dVtiQ/hqdefault.jpg',
                thumbnailAlt: 'Soothing Rain Sounds'
            },
            {
                category: 'Rain',
                url: 'https://www.youtube.com/watch?v=0dcFWLV_OlI',
                title: 'Soothing rain sounds in hitting clay jars with distant thunder. Great for relaxing and deep sleep.',
                meta: 'healing by nature • Rain',
                duration: '3:19:39',
                thumbnail: 'https://i.ytimg.com/vi/0dcFWLV_OlI/hqdefault.jpg',
                thumbnailAlt: 'Soothing rain sounds in hitting clay jars with distant thunder'
            },
            {
                category: 'island',
                url: 'https://www.youtube.com/watch?v=Q-PQ2AcieH8',
                title: 'French Polynesia: 3 Hours of Tropical Island Ambience For Relaxation',
                meta: 'MyTranquilitee • island',
                duration: '3:03:14',
                thumbnail: 'https://i.ytimg.com/vi/Q-PQ2AcieH8/hqdefault.jpg',
                thumbnailAlt: 'French Polynesia tropical island ambience'
            },
            {
                category: 'island',
                url: 'https://www.youtube.com/watch?v=G0n-rlbiijw&t=32s',
                title: '[8시간] 제주도 협재 바다 파도 소리 ASMR, 수면, 휴식, 집중, 공부, Relaxing Music',
                meta: '몽돌파도 ASMR • island',
                duration: '8:00:49',
                thumbnail: 'https://i.ytimg.com/vi/G0n-rlbiijw/hqdefault.jpg',
                thumbnailAlt: '제주도 협재 바다 파도 소리 ASMR'
            },
            {
                category: 'street',
                url: 'https://www.youtube.com/watch?v=QP11A3q7ZP4',
                title: '🇯🇵 Japan Walking Tour - Wandering Historic Streets of Kyoto [ 4K HDR - 60fps ]',
                meta: 'World Wanderings: 4K Walking Tours • street',
                duration: '1:22:08',
                thumbnail: 'https://i.ytimg.com/vi/QP11A3q7ZP4/hqdefault.jpg',
                thumbnailAlt: 'Japan walking tour through historic streets of Kyoto'
            },
            {
                category: 'street',
                url: 'https://www.youtube.com/watch?v=pQzt0sQ3Pio',
                title: 'Quiet Dawn Walk along Philosopher\'s Path | Kyoto, Japan 4K Morning Ambience',
                meta: 'Ambient Exploration • street',
                duration: '1:48:48',
                thumbnail: 'https://i.ytimg.com/vi/pQzt0sQ3Pio/hqdefault.jpg',
                thumbnailAlt: 'Quiet dawn walk along Philosopher\'s Path in Kyoto'
            },
            {
                category: 'street',
                url: 'https://www.youtube.com/watch?v=YlNDqTN8e_g',
                title: 'Sunset Walk on Side Streets and Iconic Sights | Kyoto, Japan 4K',
                meta: 'Ambient Exploration • street',
                duration: '2:26:59',
                thumbnail: 'https://i.ytimg.com/vi/YlNDqTN8e_g/hqdefault.jpg',
                thumbnailAlt: 'Sunset walk on side streets and iconic sights in Kyoto'
            }
        ];

        const contentList = document.getElementById('content-list');
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const categoryButtons = document.querySelectorAll('[data-category]');

        function renderList(items) {
            contentList.replaceChildren(...items.map((item) => {
                const card = document.createElement('div');
                card.className = 'group cursor-pointer';
                card.tabIndex = 0;
                card.setAttribute('role', 'link');
                card.setAttribute('aria-label', `${item.title} 열기`);
                card.addEventListener('click', () => {
                    openVideoUrl(item.url);
                });
                card.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        openVideoUrl(item.url);
                    }
                });

                const thumbnailWrap = document.createElement('div');
                thumbnailWrap.className = 'relative aspect-video rounded-xl overflow-hidden shadow-[0_8px_32px_rgba(43,53,48,0.04)] bg-surface-container-low';

                const thumbnail = document.createElement('img');
                thumbnail.alt = 'Thumbnail';
                thumbnail.className = 'w-full h-full object-cover group-hover:scale-105 transition-transform duration-700';
                thumbnail.dataset.alt = item.thumbnailAlt;
                thumbnail.src = item.thumbnail;

                const duration = document.createElement('div');
                duration.className = 'absolute bottom-3 right-3 bg-black/70 text-white text-[10px] px-1.5 py-0.5 rounded font-medium tracking-widest';
                duration.textContent = item.duration;

                thumbnailWrap.append(thumbnail, duration);

                const info = document.createElement('div');
                info.className = 'mt-4 flex gap-4';

                const channelWrap = document.createElement('div');
                channelWrap.className = 'w-10 h-10 shrink-0 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center text-xs font-extrabold uppercase';
                channelWrap.textContent = item.category.slice(0, 1);

                const textWrap = document.createElement('div');

                const title = document.createElement('h3');
                title.className = 'text-on-surface font-bold text-lg tracking-tight leading-tight mb-1 group-hover:text-primary transition-colors';
                title.textContent = item.title;

                const meta = document.createElement('p');
                meta.className = 'text-on-surface-variant text-sm font-medium';
                meta.textContent = item.meta;

                textWrap.append(title, meta);
                info.append(channelWrap, textWrap);
                card.append(thumbnailWrap, info);

                return card;
            }));
        }

        function openVideoUrl(url) {
            window.open(url, '_blank');
        }

        function applySearch() {
            const keyword = searchInput.value.trim().toLowerCase();
            const filteredList = keyword
                ? list.filter((item) => item.title.toLowerCase().includes(keyword))
                : list;

            renderList(filteredList);
            sheet.classList.add('translate-y-full');
        }

        function applyCategoryFilter(category) {
            searchInput.value = '';
            renderList(list.filter((item) => item.category === category));
            sheet.classList.add('translate-y-full');
        }

        renderList(list);

        const sheet = document.getElementById('search-sheet');
        const overlay = document.getElementById('search-sheet-overlay');

        searchButton.addEventListener('click', applySearch);
        searchInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                applySearch();
            }
        });
        categoryButtons.forEach((button) => {
            button.addEventListener('click', () => {
                applyCategoryFilter(button.dataset.category);
            });
        });
        
        // Use an observer or simple logic to handle overlay appearance
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'class') {
                    if (sheet.classList.contains('translate-y-full')) {
                        overlay.classList.add('opacity-0', 'pointer-events-none');
                    } else {
                        overlay.classList.remove('opacity-0', 'pointer-events-none');
                    }
                }
            });
        });
        
        observer.observe(sheet, { attributes: true });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch((error) => {
                    console.warn('Service worker registration failed:', error);
                });
            });
        }
    </script>
</body></html>
