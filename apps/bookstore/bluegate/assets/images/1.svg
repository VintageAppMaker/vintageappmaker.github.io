<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">마지막 배송지의 침묵</title>
  <desc id="desc">비 내리는 항구 골목과 파란 대문을 표현한 표지 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132033"/>
      <stop offset="55%" stop-color="#294563"/>
      <stop offset="100%" stop-color="#71839a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="180" fill="rgba(255,255,255,0.08)"/>
  <rect x="0" y="640" width="1200" height="260" fill="#0f1724"/>
  <path d="M0 700 L160 660 L310 690 L470 640 L660 700 L820 650 L1010 700 L1200 660 L1200 900 L0 900 Z" fill="#1a2638"/>
  <rect x="780" y="300" width="180" height="280" rx="10" fill="#23466d" stroke="#9fb8d4" stroke-opacity="0.4"/>
  <circle cx="918" cy="444" r="10" fill="#d9e6f2"/>
  <path d="M120 710 C260 560 420 500 610 500" stroke="#87a3bf" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.65"/>
  <g fill="#f8fbff">
    <text x="100" y="148" font-size="34" font-family="Pretendard, Noto Sans KR, sans-serif" opacity="0.78" letter-spacing="6">MYSTERY NARRATIVE</text>
    <text x="100" y="720" font-size="82" font-weight="700" font-family="Pretendard, Noto Sans KR, sans-serif">마지막 배송지의 침묵</text>
    <text x="100" y="784" font-size="28" font-family="Pretendard, Noto Sans KR, sans-serif" opacity="0.82">비에 젖은 골목, 파란 대문, 마지막 주소</text>
  </g>
</svg>
