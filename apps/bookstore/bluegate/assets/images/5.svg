<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">수취인: 강지훈</title>
  <desc id="desc">끝나지 않는 배송 목록과 자기 자신의 이름을 표현한 표지 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1721"/>
      <stop offset="55%" stop-color="#25394f"/>
      <stop offset="100%" stop-color="#798ea3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="720" y="170" width="320" height="430" rx="24" fill="#edf1f5" transform="rotate(-4 720 170)"/>
  <rect x="744" y="196" width="272" height="44" rx="10" fill="#dae3ea" transform="rotate(-4 744 196)"/>
  <text x="780" y="255" font-size="34" font-weight="700" font-family="Pretendard, Noto Sans KR, sans-serif" fill="#324255" transform="rotate(-4 720 170)">수취인: 강지훈</text>
  <text x="780" y="312" font-size="24" font-family="Pretendard, Noto Sans KR, sans-serif" fill="#526174" transform="rotate(-4 720 170)">다음 배송지: 해안길 12번지</text>
  <g fill="#f8fbff">
    <text x="104" y="148" font-size="34" font-family="Pretendard, Noto Sans KR, sans-serif" opacity="0.78" letter-spacing="6">THE DELIVERY NEVER ENDS</text>
    <text x="104" y="718" font-size="86" font-weight="700" font-family="Pretendard, Noto Sans KR, sans-serif">수취인: 강지훈</text>
    <text x="104" y="786" font-size="28" font-family="Pretendard, Noto Sans KR, sans-serif" opacity="0.82">비어야 할 적재함에 자기 이름의 상자들이 다시 채워진다</text>
  </g>
</svg>
