<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">묶인 손목</title>
  <desc id="desc">열린 문과 묶인 손목의 위협적인 순간을 표현한 표지 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141018"/>
      <stop offset="55%" stop-color="#3d2f3f"/>
      <stop offset="100%" stop-color="#7f6c74"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="760" y="170" width="220" height="420" rx="12" fill="#1a1419" stroke="#9a8490" stroke-opacity="0.4"/>
  <rect x="770" y="180" width="200" height="400" rx="10" fill="#110e12"/>
  <rect x="430" y="330" width="340" height="96" rx="48" fill="#d7c5c0"/>
  <path d="M510 322 C560 280 635 280 688 322" fill="none" stroke="#2f262d" stroke-width="18" stroke-linecap="round"/>
  <path d="M500 390 C550 350 650 350 705 390" fill="none" stroke="#2f262d" stroke-width="18" stroke-linecap="round"/>
  <path d="M490 350 C560 400 640 280 720 350" fill="none" stroke="#54454d" stroke-width="22" stroke-linecap="round"/>
  <g fill="#f8fbff">
    <text x="100" y="148" font-size="34" font-family="Pretendard, Noto Sans KR, sans-serif" opacity="0.78" letter-spacing="6">THE DOOR OPENS FIRST</text>
    <text x="100" y="718" font-size="94" font-weight="700" font-family="Pretendard, Noto Sans KR, sans-serif">묶인 손목</text>
    <text x="100" y="786" font-size="28" font-family="Pretendard, Noto Sans KR, sans-serif" opacity="0.82">문 안쪽 어둠과 기괴한 끈이 동시에 보인다</text>
  </g>
</svg>
