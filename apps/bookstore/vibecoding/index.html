<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe coding Book</title>
    <style>
        :root {
            --bg: #f4efe6;
            --paper: #fffdf8;
            --paper-strong: #fffaf0;
            --ink: #241b14;
            --muted: #7a6858;
            --line: #d8c7b3;
            --accent: #b45a3c;
            --accent-strong: #8f4028;
            --accent-soft: #f4d8c8;
            --shadow: 0 18px 45px rgba(55, 32, 14, 0.12);
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: "Noto Sans KR", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(180, 90, 60, 0.18), transparent 22rem),
                radial-gradient(circle at bottom right, rgba(153, 117, 72, 0.12), transparent 24rem),
                linear-gradient(180deg, #f9f5ee 0%, var(--bg) 100%);
        }

        body.sidebar-open {
            overflow: hidden;
        }

        .app-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
        }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: auto;
            padding: 1.5rem 1.25rem;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(14px);
            border-right: 1px solid rgba(122, 104, 88, 0.18);
        }

        .sidebar-header {
            margin-bottom: 1.25rem;
        }

        .eyebrow {
            margin: 0 0 0.35rem;
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
        }

        .sidebar-title {
            margin: 0;
            font-size: 1.85rem;
            line-height: 1.1;
            font-family: Georgia, "Times New Roman", serif;
        }

        .sidebar-description {
            margin: 0.75rem 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .toc {
            display: grid;
            gap: 1rem;
            padding-bottom: 2rem;
        }

        .chapter {
            border: 1px solid rgba(122, 104, 88, 0.14);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.55);
            box-shadow: 0 8px 20px rgba(86, 59, 28, 0.05);
        }

        .chapter-title {
            margin: 0;
            padding: 0.9rem 1rem;
            background: linear-gradient(135deg, rgba(180, 90, 60, 0.14), rgba(255, 250, 240, 0.9));
            border-bottom: 1px solid rgba(122, 104, 88, 0.12);
            font-size: 1rem;
        }

        .chapter-list {
            list-style: none;
            margin: 0;
            padding: 0.4rem;
        }

        .chapter-list li + li {
            margin-top: 0.2rem;
        }

        .toc-link {
            width: 100%;
            border: 0;
            background: transparent;
            color: inherit;
            text-align: left;
            padding: 0.75rem 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease, color 0.2s ease;
            display: flex;
            gap: 0.8rem;
            align-items: baseline;
        }

        .toc-link:hover,
        .toc-link:focus-visible {
            outline: none;
            background: rgba(180, 90, 60, 0.1);
            transform: translateX(2px);
        }

        .toc-link.is-active {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff8f1;
            box-shadow: 0 12px 25px rgba(143, 64, 40, 0.24);
        }

        .toc-number {
            flex: 0 0 auto;
            min-width: 1.6rem;
            font-weight: 700;
            opacity: 0.82;
        }

        .toc-text {
            flex: 1;
            line-height: 1.45;
            word-break: keep-all;
        }

        .content {
            min-width: 0;
            padding: 1.5rem;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 1rem;
        }

        .hero,
        .viewer,
        .nav-bar {
            background: rgba(255, 253, 248, 0.88);
            border: 1px solid rgba(122, 104, 88, 0.16);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .hero {
            padding: 1.2rem 1.35rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .hero-copy h2 {
            margin: 0;
            font-size: 1.45rem;
            line-height: 1.3;
        }

        .hero-copy p {
            margin: 0.4rem 0 0;
            color: var(--muted);
        }

        .mobile-menu-button {
            display: none;
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: #fff8f1;
            padding: 0.8rem 1rem;
            cursor: pointer;
            font-weight: 700;
        }

        .viewer {
            overflow: hidden;
            min-height: 60vh;
        }

        .viewer-frame {
            width: 100%;
            height: 100%;
            min-height: 60vh;
            border: 0;
            background: white;
        }

        .nav-bar {
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-meta {
            min-width: 0;
        }

        .nav-label {
            margin: 0;
            font-size: 0.84rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--muted);
        }

        .nav-title {
            margin: 0.3rem 0 0;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .nav-actions {
            display: flex;
            gap: 0.75rem;
        }

        .nav-button {
            border: 0;
            border-radius: 999px;
            padding: 0.9rem 1.25rem;
            cursor: pointer;
            font-weight: 700;
            color: #fff8f1;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .nav-button:hover,
        .nav-button:focus-visible {
            outline: none;
            transform: translateY(-1px);
        }

        .nav-button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .overlay {
            display: none;
        }

        @media (max-width: 960px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: min(88vw, 360px);
                height: auto;
                z-index: 30;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
            }

            body.sidebar-open .sidebar {
                transform: translateX(0);
            }

            .content {
                padding: 1rem;
            }

            .mobile-menu-button,
            .overlay {
                display: block;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(20, 15, 11, 0.36);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s ease;
                z-index: 20;
            }

            body.sidebar-open .overlay {
                opacity: 1;
                pointer-events: auto;
            }

            .viewer-frame {
                min-height: 58vh;
            }
        }

        @media (max-width: 640px) {
            .hero,
            .nav-bar {
                border-radius: 18px;
            }

            .hero {
                align-items: flex-start;
                flex-direction: column;
            }

            .nav-bar {
                align-items: stretch;
            }

            .nav-actions {
                width: 100%;
            }

            .nav-button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <p class="eyebrow">Book Index</p>
                <h1 class="sidebar-title">Vibe coding book</h1>
                <p class="sidebar-description">현재 폴더 구조를 기준으로 챕터와 페이지를 구성한 반응형 북 뷰어입니다.</p>
            </div>
            <nav class="toc" id="toc" aria-label="목차"></nav>
        </aside>

        <main class="content">
            <section class="hero">
                <div class="hero-copy">
                    <h2 id="currentTitle">문서를 선택하세요</h2>
                    <p id="currentPath">좌측 목차에서 항목을 선택하면 여기서 내용을 읽을 수 있습니다.</p>
                </div>
                <button class="mobile-menu-button" id="menuButton" type="button" aria-controls="sidebar" aria-expanded="false">목차</button>
            </section>

            <section class="viewer">
                <iframe class="viewer-frame" id="contentFrame" title="문서 보기"></iframe>
            </section>

            <section class="nav-bar">
                <div class="nav-meta">
                    <p class="nav-label">Current Page</p>
                    <p class="nav-title" id="navTitle">선택된 문서가 없습니다.</p>
                </div>
                <div class="nav-actions">
                    <button class="nav-button" id="prevButton" type="button">이전</button>
                    <button class="nav-button" id="nextButton" type="button">다음</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const tocData = [
            {
                title: "1장",
                items: [
                    { path: "1장/1.생각없이_실행하기.html", fileName: "1.생각없이_실행하기.html" },
                    { path: "1장/2.바이브코딩_수칙.html", fileName: "2.바이브코딩_수칙.html" },
                    { path: "1장/3.컴퓨팅사고력과_바이브코딩.html", fileName: "3.컴퓨팅사고력과_바이브코딩.html" },
                    { path: "1장/4.조금어려운_컴퓨팅사고.html", fileName: "4.조금어려운_컴퓨팅사고.html" },
                    { path: "1장/5.바이브코딩_의_핵심_디버깅.html", fileName: "5.바이브코딩_의_핵심_디버깅.html" },
                    { path: "1장/6.바이브코딩의_문제점_정리.html", fileName: "6.바이브코딩의_문제점_정리.html" },
                    { path: "1장/7.바이브코딩에서도_직접코딩_필요한이유.html", fileName: "7.바이브코딩에서도_직접코딩_필요한이유.html" },
                    { path: "1장/8.바이브코딩에서_프로그래밍학습_필요한이유.html", fileName: "8.바이브코딩에서_프로그래밍학습_필요한이유.html" }
                ]
            },
            {
                title: "2장",
                items: [
                    { path: "2장/1.html구조와중요태그.html", fileName: "1.html구조와중요태그.html" },
                    { path: "2장/2.html필수태그요약.html", fileName: "2.html필수태그요약.html" },
                    { path: "2장/3.html제어(DOM).html", fileName: "3.html제어(DOM).html" },
                    { path: "2장/4.크롬브라우저활용법.html", fileName: "4.크롬브라우저활용법.html" }
                ]
            },
            {
                title: "3장",
                items: [
                    { path: "3장/1.자바스크립트를_왜_배워야하나.html", fileName: "1.자바스크립트를_왜_배워야하나.html" },
                    { path: "3장/2.자바스크립트_구성_및_설정.html", fileName: "2.자바스크립트_구성_및_설정.html" },
                    { path: "3장/3.자바스크립트_상수_변수_주석.html", fileName: "3.자바스크립트_상수_변수_주석.html" },
                    { path: "3장/4.자바스크립트_데이터타입과형변환.html", fileName: "4.자바스크립트_데이터타입과형변환.html" },
                    { path: "3장/5.자바스크립트_조건문과반복문.html", fileName: "5.자바스크립트_조건문과반복문.html" },
                    { path: "3장/6.자바스크립트_범위(지역,전역,클로져).html", fileName: "6.자바스크립트_범위(지역,전역,클로져).html" },
                    { path: "3장/7.자바스크립트_함수.html", fileName: "7.자바스크립트_함수.html" },
                    { path: "3장/8.자바스크립트_컬렉션.html", fileName: "8.자바스크립트_컬렉션.html" },
                    { path: "3장/9.자바스크립트_객체지향프로그래밍.html", fileName: "9.자바스크립트_객체지향프로그래밍.html" },
                    { path: "3장/10.자바스크립트_API와통신.html", fileName: "10.자바스크립트_API와통신.html" },
                    { path: "3장/11.자바스크립트_비동기프로그래밍.html", fileName: "11.자바스크립트_비동기프로그래밍.html" },
                    { path: "3장/12.자바스크립트_nullish.html", fileName: "12.자바스크립트_nullish.html" },
                    { path: "3장/13.자바스크립트_spread_rest.html", fileName: "13.자바스크립트_spread_rest.html" },
                    { path: "3장/14.자바스크립트_구조분해할당.html", fileName: "14.자바스크립트_구조분해할당.html" },
                    { path: "3장/15.자바스크립트_논리OR연산자.html", fileName: "15.자바스크립트_논리OR연산자.html" },
                    { path: "3장/16.자바스크립트_이중Not_옵셔널체이닝.html", fileName: "16.자바스크립트_이중Not_옵셔널체이닝.html" },
                    { path: "3장/17.자바스크립트_이중부정연산자.html", fileName: "17.자바스크립트_이중부정연산자.html" },
                    { path: "3장/18.자바스크립트_일치연산자.html", fileName: "18.자바스크립트_일치연산자.html" },
                    { path: "3장/19.자바스크립트_모듈.html", fileName: "19.자바스크립트_모듈.html" }
                ]
            },
            {
                title: "4장",
                items: [
                    { path: "4장/1.도전_바이브_계산기.html", fileName: "1.도전_바이브_계산기.html" },
                    { path: "4장/2.도전_바이브_구글지도.html", fileName: "2.도전_바이브_구글지도.html" },
                    { path: "4장/3.도전_바이브코딩_TODO.html", fileName: "3.도전_바이브코딩_TODO.html" }
                ]
            }
        ];

        const flattenedItems = tocData
            .flatMap((chapter) => chapter.items.map((item) => ({ ...item, chapterTitle: chapter.title })));

        const tocElement = document.getElementById("toc");
        const contentFrame = document.getElementById("contentFrame");
        const currentTitle = document.getElementById("currentTitle");
        const currentPath = document.getElementById("currentPath");
        const navTitle = document.getElementById("navTitle");
        const prevButton = document.getElementById("prevButton");
        const nextButton = document.getElementById("nextButton");
        const menuButton = document.getElementById("menuButton");
        const overlay = document.getElementById("overlay");

        let currentIndex = 0;
        let buttons = [];

        function parseOrder(fileName) {
            const match = fileName.match(/^(\d+)\./);
            return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
        }

        function formatLabel(fileName) {
            const withoutExtension = fileName.replace(/\.html$/i, "");
            const [order, ...rest] = withoutExtension.split(".");
            const rawTitle = rest.join(".") || withoutExtension;
            return {
                order: /^\d+$/.test(order) ? order : "",
                title: rawTitle.replaceAll("_", " ")
            };
        }

        tocData.forEach((chapter) => {
            chapter.items.sort((a, b) => parseOrder(a.fileName) - parseOrder(b.fileName));

            const chapterSection = document.createElement("section");
            chapterSection.className = "chapter";

            const heading = document.createElement("h3");
            heading.className = "chapter-title";
            heading.textContent = chapter.title;

            const list = document.createElement("ul");
            list.className = "chapter-list";

            chapter.items.forEach((item) => {
                const info = formatLabel(item.fileName);
                const listItem = document.createElement("li");
                const button = document.createElement("button");
                button.type = "button";
                button.className = "toc-link";
                button.dataset.path = item.path;
                button.innerHTML = `<span class="toc-number">${info.order}</span><span class="toc-text">${info.title}</span>`;
                button.addEventListener("click", () => openByPath(item.path));
                listItem.appendChild(button);
                list.appendChild(listItem);
                buttons.push(button);
            });

            chapterSection.append(heading, list);
            tocElement.appendChild(chapterSection);
        });

        function closeSidebar() {
            document.body.classList.remove("sidebar-open");
            menuButton.setAttribute("aria-expanded", "false");
        }

        function openSidebar() {
            document.body.classList.add("sidebar-open");
            menuButton.setAttribute("aria-expanded", "true");
        }

        function syncNav() {
            const item = flattenedItems[currentIndex];
            const info = formatLabel(item.fileName);
            currentTitle.textContent = `${item.chapterTitle} · ${info.title}`;
            currentPath.textContent = item.path;
            navTitle.textContent = `${currentIndex + 1} / ${flattenedItems.length} · ${info.title}`;
            prevButton.disabled = currentIndex === 0;
            nextButton.disabled = currentIndex === flattenedItems.length - 1;

            buttons.forEach((button) => {
                button.classList.toggle("is-active", button.dataset.path === item.path);
            });
        }

        function openByPath(path) {
            const index = flattenedItems.findIndex((item) => item.path === path);
            if (index === -1) {
                return;
            }

            currentIndex = index;
            contentFrame.src = encodeURI(flattenedItems[currentIndex].path);
            syncNav();

            if (window.innerWidth <= 960) {
                closeSidebar();
            }
        }

        prevButton.addEventListener("click", () => {
            if (currentIndex > 0) {
                openByPath(flattenedItems[currentIndex - 1].path);
            }
        });

        nextButton.addEventListener("click", () => {
            if (currentIndex < flattenedItems.length - 1) {
                openByPath(flattenedItems[currentIndex + 1].path);
            }
        });

        menuButton.addEventListener("click", () => {
            if (document.body.classList.contains("sidebar-open")) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        overlay.addEventListener("click", closeSidebar);

        window.addEventListener("resize", () => {
            if (window.innerWidth > 960) {
                closeSidebar();
            }
        });

        openByPath(flattenedItems[0].path);
    </script>
</body>
</html>
