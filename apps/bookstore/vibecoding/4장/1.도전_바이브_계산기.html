<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Vertical History Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'system-ui', 'sans-serif'],
            mono: ['JetBrains+Mono', 'monospace'],
          },
          colors: {
            brand: {
              bg: '#f0f2f5',
              card: '#ffffff',
              display: '#fafafa',
              btnDefault: '#e4e6eb',
              btnDefaultHover: '#d8dadf',
              btnOp: '#ff9500',
              btnOpHover: '#e68600',
              btnEqual: '#007bff',
              btnEqualHover: '#0069d9',
              btnShare: '#28a745',
              btnShareHover: '#218838',
              textPrimary: '#1c1e21',
              textSecondary: '#65676b',
            }
          },
          boxShadow: {
            'premium': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05)',
            'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.03)',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f0f2f5;
      -webkit-tap-highlight-color: transparent;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
    .calc-btn {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .calc-btn:active {
      transform: scale(0.95);
    }
    .history-list::-webkit-scrollbar {
      width: 4px;
    }
    .history-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .history-list::-webkit-scrollbar-thumb {
      background: #e4e6eb;
      border-radius: 10px;
    }
    .history-item {
      animation: slideIn 0.3s ease-out forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-4 sm:p-8">

  <div class="flex flex-col gap-6 w-full max-w-[340px]">
    
    <!-- Calculator Container -->
    <main class="brand-card bg-brand-card rounded-[24px] p-6 shadow-premium border border-white/50 relative overflow-hidden">
      <!-- Decorative element -->
      <div class="absolute -top-12 -right-12 w-24 h-24 bg-brand-btnEqual/5 rounded-full blur-2xl"></div>
      
      <header class="mb-6">
        <h1 class="text-brand-textPrimary font-bold text-xl tracking-tight">Calculator</h1>
        <p class="text-brand-textSecondary text-xs">Smart calculation history</p>
      </header>

      <!-- Display Area -->
      <div class="relative mb-6">
        <input 
          type="text" 
          id="display" 
          readonly 
          placeholder="0"
          class="w-full h-[72px] bg-brand-display rounded-2xl border border-gray-100 px-5 text-right text-3xl font-mono text-brand-textPrimary shadow-inner-soft focus:outline-none placeholder-gray-300"
        >
      </div>

      <!-- Button Grid -->
      <div class="grid grid-cols-4 gap-3">
        <!-- Row 1 -->
        <button onclick="clearDisplay()" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-semibold text-lg">C</button>
        <button onclick="deleteLast()" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-semibold text-lg">DEL</button>
        <button onclick="append('%')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-semibold text-lg">%</button>
        <button onclick="append('/')" class="calc-btn h-14 rounded-2xl bg-brand-btnOp hover:bg-brand-btnOpHover text-white font-semibold text-xl">/</button>

        <!-- Row 2 -->
        <button onclick="append('7')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">7</button>
        <button onclick="append('8')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">8</button>
        <button onclick="append('9')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">9</button>
        <button onclick="append('*')" class="calc-btn h-14 rounded-2xl bg-brand-btnOp hover:bg-brand-btnOpHover text-white font-semibold text-xl">×</button>

        <!-- Row 3 -->
        <button onclick="append('4')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">4</button>
        <button onclick="append('5')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">5</button>
        <button onclick="append('6')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">6</button>
        <button onclick="append('-')" class="calc-btn h-14 rounded-2xl bg-brand-btnOp hover:bg-brand-btnOpHover text-white font-semibold text-xl">−</button>

        <!-- Row 4 -->
        <button onclick="append('1')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">1</button>
        <button onclick="append('2')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">2</button>
        <button onclick="append('3')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">3</button>
        <button onclick="append('+')" class="calc-btn h-14 rounded-2xl bg-brand-btnOp hover:bg-brand-btnOpHover text-white font-semibold text-xl">+</button>

        <!-- Row 5 -->
        <button onclick="append('0')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl col-span-2">0</button>
        <button onclick="append('.')" class="calc-btn h-14 rounded-2xl bg-brand-btnDefault hover:bg-brand-btnDefaultHover text-brand-textPrimary font-medium text-xl">.</button>
        <button onclick="calculate()" class="calc-btn h-14 rounded-2xl bg-brand-btnEqual hover:bg-brand-btnEqualHover text-white font-bold text-2xl">=</button>
      </div>
    </main>

    <!-- History Container -->
    <section class="bg-brand-card rounded-[24px] p-6 shadow-premium border border-white/50">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-brand-textPrimary font-bold text-sm uppercase tracking-wider">History</h3>
        <button onclick="clearHistory()" class="text-xs text-red-500 hover:text-red-600 font-semibold px-2 py-1 transition-colors">Clear All</button>
      </div>

      <div class="history-container">
        <ul id="historyList" class="history-list space-y-2 max-h-[180px] overflow-y-auto pr-1">
          <!-- History items will be injected here -->
          <li class="text-center py-4 text-brand-textSecondary text-xs italic opacity-50">No history yet</li>
        </ul>
      </div>

      <button onclick="shareHistory()" class="share-btn w-full mt-6 py-4 bg-brand-btnShare hover:bg-brand-btnShareHover text-white font-bold rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2 group active:scale-[0.98]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
        </svg>
        Share Results
      </button>
    </section>

  </div>

  <script>
    // State Management
    let history = JSON.parse(localStorage.getItem('calc_history')) || [];
    const displayElement = document.getElementById('display');
    const historyListElement = document.getElementById('historyList');

    // Initialize
    window.onload = () => {
      renderHistory();
    };

    // Append character to display
    function append(char) {
      if (displayElement.value === '0' && char !== '.') {
        displayElement.value = char;
      } else {
        displayElement.value += char;
      }
      console.log(`Input added: ${char}`);
    }

    // Clear display
    function clearDisplay() {
      displayElement.value = '';
    }

    // Delete last character
    function deleteLast() {
      displayElement.value = displayElement.value.slice(0, -1);
    }

    // Perform calculation
    function calculate() {
      const expression = displayElement.value.trim();
      
      if (!expression) return;

      try {
        // Evaluate the expression
        // Using eval safely within a try-catch for the prototype context
        const result = eval(expression.replace(/×/g, '*').replace(/÷/g, '/'));
        
        // Format for display and record
        const formattedResult = Number.isInteger(result) ? result : parseFloat(result.toFixed(8));
        const record = `${expression} = ${formattedResult}`;
        
        // Update Display
        displayElement.value = formattedResult;

        // Update History State
        history.unshift(record);
        if (history.length > 50) {
          history.pop();
        }

        saveAndRender();
        console.log(`Calculation success: ${record}`);
      } catch (error) {
        console.error('Calculation Error:', error);
        alert('잘못된 수식입니다.');
        clearDisplay();
      }
    }

    // Save to LocalStorage and Render UI
    function saveAndRender() {
      localStorage.setItem('calc_history', JSON.stringify(history));
      renderHistory();
    }

    // Render History List UI
    function renderHistory() {
      if (history.length === 0) {
        historyListElement.innerHTML = '<li class="text-center py-4 text-brand-textSecondary text-xs italic opacity-50">No history yet</li>';
        return;
      }

      historyListElement.innerHTML = history.map((item, index) => {
        const parts = item.split('=');
        return `
          <li class="history-item flex flex-col items-end py-3 px-1 border-b border-gray-100 last:border-0">
            <span class="text-[10px] text-brand-textSecondary font-mono opacity-70">${parts[0]}=</span>
            <span class="text-sm text-brand-textPrimary font-bold font-mono">${parts[1]}</span>
          </li>
        `;
      }).join('');
    }

    // Clear all history
    function clearHistory() {
      if (history.length === 0) return;
      
      if (confirm('모든 기록을 삭제할까요?')) {
        history = [];
        saveAndRender();
      }
    }

    // Share Functionality
    async function shareHistory() {
      if (history.length === 0) {
        alert('공유할 기록이 없습니다.');
        return;
      }

      const shareText = "--- 계산 기록 ---\n" + history.join('\n');

      if (navigator.share) {
        try {
          await navigator.share({
            title: '계산기 기록 공유',
            text: shareText
          });
          console.log('공유 성공');
        } catch (err) {
          console.log('공유 취소됨 또는 실패:', err);
        }
      } else {
        // Fallback to Clipboard
        try {
          await navigator.clipboard.writeText(shareText);
          alert('기록이 클립보드에 복사되었습니다.');
        } catch (err) {
          alert('공유 기능을 사용할 수 없습니다.');
          console.error('Copy failed', err);
        }
      }
    }

    // Add keyboard support
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      if (/[0-9]/.test(key)) append(key);
      if (['+', '-', '*', '/', '.', '%'].includes(key)) append(key);
      if (key === 'Enter') calculate();
      if (key === 'Escape') clearDisplay();
      if (key === 'Backspace') deleteLast();
    });
  </script>
</body>
</html>
