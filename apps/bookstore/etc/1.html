<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>낯선 평온 - Refined Storytelling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500;700&family=Pretendard:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f8f7f4', // Warm off-white
                            surface: '#ffffff',
                            accent: '#6b7a8f', // Muted slate blue
                            text: '#2d3436',
                            muted: '#636e72'
                        }
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                        serif: ['Noto Serif KR', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 1.5s ease-out forwards',
                        'slide-up': 'slideUp 1s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8f7f4;
            color: #2d3436;
            -webkit-font-smoothing: antialiased;
        }
        .glass-player {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
        }
        audio::-webkit-media-controls-panel {
            background-color: rgba(255, 255, 255, 0.9);
        }
        .story-content {
            line-height: 2.2;
            letter-spacing: -0.01em;
        }
        .image-container img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .image-container:hover img {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="font-sans selection:bg-brand-accent/20">

    <div class="min-h-screen flex flex-col items-center px-6 py-12 md:py-24">
        
        <!-- Header Section -->
        <header class="w-full max-w-2xl mb-12 md:mb-20 text-center animate-fade-in">
            <h1 class="font-serif text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight text-brand-text mb-4">
                낯선 평온
            </h1>
            <div class="h-1 w-12 bg-brand-accent mx-auto rounded-full opacity-40"></div>
        </header>

        <!-- Main Content Area -->
        <main class="w-full max-w-2xl flex flex-col space-y-12 md:space-y-16 animate-slide-up" style="animation-delay: 0.2s;">
            
            <!-- Story Image -->
            <div class="image-container overflow-hidden">
                <img src='1.png' alt='평온한 아침의 풍경' class="block mx-auto" />
            </div>

            <!-- Story Text -->
            <article class="story-content text-lg md:text-xl font-serif text-brand-text/90 px-2">
                <p class="mb-8 first-letter:text-4xl first-letter:font-bold first-letter:mr-2 first-letter:float-left">
                    성준은 고요 속에 앉아 있었다. 창밖 도시의 소리는 부재했다. 습관처럼 감지되던 엔진의 낮은 진동이나 희미한 인파의 물결이 사라진 자리에는 오직 정지된 공기만이 존재했다. 아침 햇살은 가구의 각진 모서리를 깎아냈고, 그 빛 속에서 먼지 한 톨 움직이지 않았다. 평온함은 낯설 만큼 완전했다.
                </p>
            </article>

        </main>

        <!-- Audio Player Section -->
        <section class="w-full max-w-2xl mt-16 md:mt-24 animate-slide-up" style="animation-delay: 0.4s;">
            <div class="glass-player p-6 md:p-8 flex flex-col items-center space-y-4">
                <div class="flex items-center space-x-3 mb-2">
                    <div class="w-2 h-2 rounded-full bg-brand-accent animate-pulse"></div>
                    <span class="text-xs font-semibold tracking-widest text-brand-accent uppercase">Atmospheric Audio</span>
                </div>
                
                <div class="w-full">
                    <audio src='1.wav' controls class="w-full h-10">
                        Your browser does not support the audio element.
                    </audio>
                </div>
                
                <p class="text-[10px] text-brand-muted/60 text-center uppercase tracking-tighter">
                    Listen to the sound of silence
                </p>
            </div>
        </section>

    </div>

    <!-- Interaction Script -->
    <script>
        // Simple entry animations for elements as they appear
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = {
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100');
                        entry.target.classList.remove('opacity-0', 'translate-y-10');
                    }
                });
            }, observerOptions);

            // Additional smooth reveal for paragraphs if needed
            document.querySelectorAll('p').forEach(p => {
                p.style.transition = "all 0.8s ease-out";
            });
        });
    </script>

</body>
</html>
